<!DOCTYPE html><html lang="it"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"><meta name="theme-color" content="#0a0a0a"><title>Area Admin — Focacceria delle Langhe</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Cormorant+Garamond:wght@400;600;700&family=Raleway:wght@500;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box} :root{--g:#DFA145;--b:#0a0a0a;--w:#fff;--mut:#aaa;--card:#141414;--line:rgba(223,161,69,.25);--danger:#d05d52} body{margin:0;background:var(--b);color:var(--w);font-family:Raleway,sans-serif;min-height:100vh} button,input,textarea,select{font:inherit}.hidden{display:none!important}.wrap{max-width:760px;margin:auto;padding:16px 14px 90px}.top{position:sticky;top:0;z-index:10;background:rgba(10,10,10,.96);backdrop-filter:blur(8px);border-bottom:1px solid var(--line);padding:12px 14px}.topin{max-width:760px;margin:auto;display:flex;align-items:center;justify-content:space-between;gap:10px}.brand{font-family:Cinzel,serif;color:var(--g);font-weight:700;letter-spacing:1px;font-size:14px}.sub{font-size:10px;color:var(--mut);letter-spacing:1.5px}.btn{border:1px solid var(--g);background:transparent;color:var(--g);border-radius:10px;padding:10px 13px;font-weight:700;cursor:pointer}.btn.primary{background:var(--g);color:#0a0a0a}.btn.danger{border-color:var(--danger);color:#ff8d82}.btn.small{padding:7px 9px;font-size:12px}.login{max-width:420px;margin:10vh auto;padding:22px;border:1px solid var(--line);border-radius:16px;background:var(--card)}h1,h2,h3{font-family:Cinzel,serif;color:var(--g)}h1{font-size:21px;margin:0 0 18px}h2{font-size:16px;margin:20px 0 10px}.field{margin:12px 0}.field label{display:block;font-size:11px;color:var(--g);margin-bottom:6px;text-transform:uppercase;letter-spacing:.7px}.input,textarea,select{width:100%;background:#0d0d0d;color:#fff;border:1px solid #333;border-radius:10px;padding:12px;outline:none}.input:focus,textarea:focus,select:focus{border-color:var(--g)}textarea{min-height:96px;resize:vertical}.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}.toolbar{display:flex;gap:8px;align-items:center;margin:12px 0;flex-wrap:wrap}.search{flex:1;min-width:180px}.chips{display:flex;gap:7px;overflow:auto;padding-bottom:4px}.chip{white-space:nowrap;border:1px solid #333;border-radius:999px;background:#111;color:#ddd;padding:8px 11px}.chip.active{background:var(--g);color:#000;border-color:var(--g)}.card{background:var(--card);border:1px solid #262626;border-radius:14px;padding:14px;margin:10px 0}.row{display:flex;justify-content:space-between;gap:12px;align-items:flex-start}.name{font-family:Cinzel,serif;font-weight:700;font-size:14px}.desc{font-family:'Cormorant Garamond',serif;color:#bbb;font-size:16px;margin-top:4px}.price{color:var(--g);font-family:Cinzel,serif;font-weight:700;white-space:nowrap}.meta{font-size:11px;color:#8f8f8f;margin-top:8px}.actions{display:flex;gap:7px;flex-wrap:wrap;margin-top:12px}.switch{position:relative;display:inline-block;width:48px;height:28px}.switch input{opacity:0;width:0;height:0}.slider{position:absolute;inset:0;background:#3a3a3a;border-radius:99px;transition:.2s}.slider:before{content:"";position:absolute;width:22px;height:22px;left:3px;top:3px;background:white;border-radius:50%;transition:.2s}.switch input:checked+.slider{background:var(--g)}.switch input:checked+.slider:before{transform:translateX(20px)}.toggleline{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid #222}.checks{display:grid;grid-template-columns:1fr 1fr;gap:8px}.check{display:flex;gap:8px;align-items:center;background:#101010;border:1px solid #292929;padding:10px;border-radius:10px;font-size:13px}.check input{accent-color:var(--g);width:18px;height:18px}.modal{position:fixed;inset:0;background:#0a0a0a;z-index:30;overflow:auto}.modalbar{position:sticky;top:0;background:#0a0a0a;border-bottom:1px solid var(--line);padding:12px;display:flex;justify-content:space-between;align-items:center}.modalbody{max-width:760px;margin:auto;padding:14px 14px 100px}.savebar{position:fixed;bottom:0;left:0;right:0;background:rgba(10,10,10,.97);border-top:1px solid var(--line);padding:10px}.savein{max-width:760px;margin:auto;display:flex;gap:8px}.savein .btn{flex:1}.notice{padding:10px;border-radius:9px;background:#241f13;border:1px solid var(--line);font-size:12px;color:#e9d6af;margin:10px 0}.error{color:#ff8d82;font-size:13px}.ok{color:#80d59a;font-size:13px}.fab{position:fixed;right:18px;bottom:18px;width:58px;height:58px;border-radius:50%;border:0;background:var(--g);color:#000;font-size:30px;box-shadow:0 8px 30px #000;z-index:15}.loading{text-align:center;color:#aaa;padding:30px}.rtl{direction:rtl;text-align:right}@media(min-width:700px){.checks{grid-template-columns:repeat(3,1fr)}}
</style></head><body>
<div id="loginView" class="login"><h1>Area Admin</h1><div class="field"><label>Email</label><input id="email" class="input" type="email" autocomplete="username"></div><div class="field"><label>Password</label><input id="password" class="input" type="password" autocomplete="current-password"></div><button id="loginBtn" class="btn primary" style="width:100%">Accedi</button><p id="loginMsg" class="error"></p></div>
<div id="appView" class="hidden"><header class="top"><div class="topin"><div><div class="brand">FOCACCERIA DELLE LANGHE</div><div class="sub">GESTIONE MENÙ</div></div><button id="logoutBtn" class="btn small">Esci</button></div></header><main class="wrap"><div class="toolbar"><input id="search" class="input search" placeholder="Cerca focaccia…"><button id="refreshBtn" class="btn small">Aggiorna</button></div><div class="chips"><button class="chip active" data-filter="all">Tutte</button><button class="chip" data-filter="salata">Salate</button><button class="chip" data-filter="dolce">Dolci</button><button class="chip" data-filter="draft">Bozze</button></div><div id="list" class="loading">Caricamento…</div></main><button id="newBtn" class="fab" aria-label="Nuova focaccia">+</button></div>
<div id="editor" class="modal hidden"><div class="modalbar"><button id="closeEditor" class="btn small">← Indietro</button><strong id="editorTitle" class="brand">NUOVA FOCACCIA</strong><button id="deleteBtn" class="btn small danger hidden">Elimina</button></div><div class="modalbody"><div id="editMsg"></div><div class="grid2"><div class="field"><label>Codice interno</label><input id="internal_code" class="input" placeholder="ES. CARMA"></div><div class="field"><label>Prezzo</label><input id="price" class="input" type="number" min="0" step="0.10"></div></div><div class="grid2"><div class="field"><label>Categoria</label><select id="category"><option value="salata">Salata</option><option value="dolce">Dolce</option></select></div><div class="field"><label>Ordine visualizzazione</label><input id="display_order" class="input" type="number" min="0" step="1"></div></div><h2>Italiano</h2><div class="field"><label>Nome</label><input id="name_it" class="input"></div><div class="field"><label>Descrizione</label><textarea id="description_it"></textarea></div><h2>Stato e badge</h2><div id="toggles"></div><h2>Allergeni</h2><div id="allergenChecks" class="checks"></div><div id="nutBlock" class="hidden"><h3>Tipo di frutta a guscio</h3><div id="nutChecks" class="checks"></div></div><h2>Traduzioni descrizione</h2><div class="notice">Il nome della focaccia resta uguale in tutte le lingue. Per ogni lingua compila soltanto la descrizione degli ingredienti.</div><div id="translations"></div></div><div class="savebar"><div class="savein"><button id="saveDraft" class="btn">Salva bozza</button><button id="publish" class="btn primary">Pubblica</button></div></div></div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><script src="config.js"></script><script src="admin.js"></script></body></html>
