<!DOCTYPE html>

<html lang="it">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport"/>
<meta content="#0a0a0a" name="theme-color"/>
<title>Focacceria delle Langhe — Menu</title>
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&amp;family=Cormorant+Garamond:ital@1&amp;family=Raleway:wght@700&amp;family=Noto+Sans+SC:wght@400&amp;family=Noto+Sans+JP:wght@400&amp;family=Noto+Sans+KR:wght@400&amp;family=Noto+Naskh+Arabic:wght@400;700&amp;display=swap" rel="stylesheet"/>
<style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --gold: #DFA145;
      --black: #0a0a0a;
      --white: #ffffff;
    }
    body {
      background: var(--black);
      color: var(--white);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      font-family: 'Cinzel', serif;
      -webkit-text-size-adjust: 100%;
      overscroll-behavior: none;
    }
    /* ── LOGO AREA ── */
    .logo-area {
      padding: 40px 24px 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .logo-img {
      width: min(260px, 68vw);
      height: auto;
      filter: drop-shadow(0 4px 24px rgba(223,161,69,0.22));
    }
    .logo-rule {
      width: min(220px, 55vw);
      height: 1px;
      background: linear-gradient(to right, transparent, var(--gold), transparent);
      margin-top: 22px;
      opacity: 0.65;
    }
    /* ── HEADLINE ── */
    .headline {
      text-align: center;
      padding: 18px 24px 6px;
      font-family: 'Cinzel', serif;
      font-size: 9px;
      font-weight: 400;
      letter-spacing: 4.5px;
      color: rgba(223,161,69,0.5);
      text-transform: uppercase;
      line-height: 2;
    }
    /* ── LANGUAGE GRID ── */
    .lang-grid {
      padding: 18px 14px 12px;
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: center;
      flex: 1;
    }
    .lang-card {
      flex: 0 0 calc(50% - 5px);
      text-decoration: none;
      padding: 17px 15px;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 2px;
      transition: background 0.15s;
      display: flex;
      flex-direction: column;
      gap: 5px;
    }
    .lang-card:active { background: rgba(255,255,255,0.04); }
    /* IT — in evidenza */
    .lang-card.it {
      border: 1px solid rgba(223,161,69,0.2);
      border-left: 2px solid var(--gold);
      background: rgba(255,255,255,0.05);
    }
    .lang-name {
      font-family: 'Cinzel', serif;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: rgba(255,255,255,0.85);
      line-height: 1.3;
    }
    .it .lang-name { color: var(--gold); }
    .lang-sub {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: 11.5px;
      color: rgba(255,255,255,0.4);
    }
    .it .lang-sub { color: rgba(223,161,69,0.55); }
    /* Español: Raleway (Cinzel manca della Ñ) */
    .es .lang-name { font-family: 'Raleway', sans-serif; letter-spacing: 1.5px; }
    /* Font CJK */
    .zh .lang-name { font-family: 'Noto Sans SC', sans-serif; letter-spacing: 1px; }
    .ja .lang-name { font-family: 'Noto Sans JP', sans-serif; letter-spacing: 1px; }
    .ko .lang-name { font-family: 'Noto Sans KR', sans-serif; letter-spacing: 1px; }
    .ar .lang-name { font-family: 'Noto Naskh Arabic', serif; letter-spacing: 0; }
    /* Arabo: RTL + bordo a destra */
    .ar {
      direction: rtl;
      text-align: right;
      border-right: 2px solid rgba(255,255,255,0.18);
    }
    .ar .lang-name { color: rgba(255,255,255,0.85); }
  
.lang-grid .lang-card { flex: 0 0 min(420px, 100%); }
</style>
</head>
